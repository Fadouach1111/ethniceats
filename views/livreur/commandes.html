<!DOCTYPE html>
<html class="light" lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EthnicEats — Commandes</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode:"class",
    theme:{ extend:{ colors:{
      "primary":"#012d1d","on-primary":"#ffffff","primary-container":"#1b4332",
      "primary-fixed":"#c1ecd4","primary-fixed-dim":"#a5d0b9","on-primary-fixed":"#002114",
      "on-primary-fixed-variant":"#274e3d","on-primary-container":"#86af99","inverse-primary":"#a5d0b9",
      "secondary":"#775a19","on-secondary":"#ffffff","secondary-container":"#fdd587",
      "on-secondary-container":"#785a19","secondary-fixed":"#ffdea3","secondary-fixed-dim":"#e8c176","on-secondary-fixed":"#261900",
      "surface":"#fbf9f8","surface-dim":"#dbdad9","surface-bright":"#fbf9f8",
      "surface-container-lowest":"#ffffff","surface-container-low":"#f5f3f3",
      "surface-container":"#efeded","surface-container-high":"#e9e8e7",
      "surface-container-highest":"#e3e2e2","surface-variant":"#e3e2e2",
      "on-surface":"#1b1c1c","on-surface-variant":"#414844",
      "background":"#fbf9f8","on-background":"#1b1c1c",
      "outline":"#717973","outline-variant":"#c1c8c2",
      "error":"#ba1a1a","error-container":"#ffdad6","on-error":"#ffffff",
      "inverse-surface":"#303030","tertiary":"#282622","on-tertiary":"#ffffff",
      "tertiary-container":"#3e3b37","on-tertiary-container":"#aaa59f","surface-tint":"#3f6653",
    }, borderRadius:{ DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px" },
    fontFamily:{ headline:["Playfair Display","serif"], body:["Manrope","sans-serif"] }
    }}
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  body { font-family:'Manrope',sans-serif; }
  h1,h2,h3 { font-family:'Playfair Display',serif; }
  .sidebar-item { color:#9ca3af; transition:all 0.2s; }
  .sidebar-item:hover { color:#012d1d; background:rgba(1,45,29,0.05); border-radius:1rem; }
  .sidebar-item.active { color:#012d1d; font-weight:700; background:rgba(1,45,29,0.07); border-radius:1rem; }
  .sidebar-item.active .material-symbols-outlined { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
  .nav-item { color:#9ca3af; }
  .nav-item.active { color:#012d1d; font-weight:700; background:rgba(1,45,29,0.05); border-radius:1rem; transform:scale(1.1); }
  .nav-item.active .material-symbols-outlined { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .skeleton { animation:pulse 1.5s ease-in-out infinite; background:#e5e2e1; border-radius:0.75rem; }
  /* Order card */
  .order-card { background:#fff; border-radius:1.25rem; box-shadow:0 2px 16px rgba(0,0,0,0.07); overflow:hidden; transition:box-shadow 0.2s; }
  .order-card:hover { box-shadow:0 4px 24px rgba(0,0,0,0.10); }
  /* Expand panel */
  .expand-panel { max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.22,1,0.36,1); }
  .expand-panel.open { max-height:800px; }
  .expand-inner { opacity:0; transform:translateY(6px); transition:opacity 0.25s ease 0.1s, transform 0.3s ease 0.05s; }
  .expand-panel.open .expand-inner { opacity:1; transform:translateY(0); }
  /* Toast */
  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-70px); background:#012d1d; color:#fff; padding:11px 22px; border-radius:50px; font-size:13px; font-weight:600; z-index:200; transition:transform 0.35s cubic-bezier(0.22,1,0.36,1); white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body class="bg-background text-on-background min-h-screen">

<div id="toast" class="toast"></div>

<!-- SIDEBAR DESKTOP -->
<nav class="hidden lg:flex fixed left-0 top-0 h-full w-64 bg-surface-container-low border-r border-outline-variant/20 flex-col items-start px-4 py-10 gap-2 z-40">
  <div class="mb-8 px-2">
    <h1 class="font-headline text-2xl text-primary font-bold">EthnicEats</h1>
    <p class="text-xs text-on-surface-variant mt-1">Espace livreur</p>
  </div>
  <a href="/livreur/commandes" class="sidebar-item active flex items-center gap-3 w-full px-4 py-3"><span class="material-symbols-outlined">receipt_long</span>Commandes</a>
  <a href="/livreur/en-cours" class="sidebar-item flex items-center gap-3 w-full px-4 py-3"><span class="material-symbols-outlined">local_shipping</span>En cours</a>
  <a href="/livreur/profil" class="sidebar-item flex items-center gap-3 w-full px-4 py-3"><span class="material-symbols-outlined">person</span>Profil</a>
</nav>

<!-- MAIN -->
<main class="lg:ml-64 pb-28 lg:pb-12">

  <!-- Header -->
  <header class="px-5 lg:px-10 pt-8 lg:pt-10 pb-4">
    <p class="text-on-surface-variant text-sm mb-1">Tableau de bord</p>
    <h1 id="greeting" class="text-3xl lg:text-4xl font-bold text-primary mb-5">Bonjour 👋</h1>
    <!-- Stats -->
    <div id="stats-skeleton" class="flex gap-3 flex-wrap">
      <div class="skeleton h-[70px] w-[148px] rounded-2xl"></div>
      <div class="skeleton h-[70px] w-[148px] rounded-2xl"></div>
    </div>
    <div id="stats-row" class="hidden flex gap-3 flex-wrap"></div>
  </header>

  <!-- Section commandes -->
  <section class="px-5 lg:px-10 mt-2 max-w-2xl">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl lg:text-2xl font-bold text-primary">Nouvelles commandes</h2>
      <span id="badge-nb" class="hidden bg-secondary-container/60 text-on-secondary-container text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider"></span>
    </div>

    <!-- Skeleton -->
    <div id="skeleton-orders" class="flex flex-col gap-3">
      <div class="skeleton h-48 w-full rounded-2xl"></div>
      <div class="skeleton h-48 w-full rounded-2xl"></div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden flex-col items-center justify-center py-20 text-center">
      <div class="w-20 h-20 mb-5 rounded-full bg-surface-container flex items-center justify-center">
        <span class="material-symbols-outlined text-4xl text-on-surface-variant/40">package_2</span>
      </div>
      <h3 class="text-lg text-primary font-bold mb-2">Aucune nouvelle commande</h3>
      <p class="text-on-surface-variant text-sm max-w-[240px] mx-auto">Les commandes s'afficheront ici lorsqu'un client passera commande</p>
    </div>

    <!-- Orders list -->
    <div id="orders-list" class="hidden flex-col gap-3"></div>
  </section>
</main>

<!-- BOTTOM NAV MOBILE -->
<nav class="lg:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#fbf9f8]/90 backdrop-blur-2xl rounded-t-[2rem] shadow-[0_-12px_32px_rgba(27,28,28,0.04)] font-['Manrope'] text-[11px] font-medium uppercase tracking-widest">
  <a class="nav-item active flex flex-col items-center justify-center px-4 py-2 transition-all" href="/livreur/commandes">
    <span class="material-symbols-outlined mb-1">receipt_long</span><span>Commandes</span>
  </a>
  <a class="nav-item flex flex-col items-center justify-center px-4 py-2 transition-all" href="/livreur/en-cours">
    <span class="material-symbols-outlined mb-1">local_shipping</span><span>En cours</span>
  </a>
  <a class="nav-item flex flex-col items-center justify-center px-4 py-2 transition-all" href="/livreur/profil">
    <span class="material-symbols-outlined mb-1">person</span><span>Profil</span>
  </a>
</nav>

<script type="module">
import { getCurrentUser }    from '../../services/authService.js';
import { protegerPage }      from '../../controllers/authController.js';
import {
  getCommandesDisponibles,
  ecouterNouvellesCommandesLivreur,
  stopperEcouteCommandes,
  accepterCommande,
  getStats,
} from '../../controllers/livreurController.js';

let livreurId = null;
let _refListener = null;

document.addEventListener('DOMContentLoaded', async () => {
  // await protegerPage('livreur'); // BYPASS TEST
  try {
    const user = await getCurrentUser();
    livreurId = user?.uid || null;
    const prenom = user?.nomComplet?.split(' ')[0] ?? 'livreur';
    document.getElementById('greeting').textContent = `Bonjour, ${prenom} 👋`;
  } catch(e) {}

  // Stats
  try {
    const s = await getStats(livreurId);
    document.getElementById('stats-skeleton').classList.add('hidden');
    document.getElementById('stats-row').classList.remove('hidden');
    document.getElementById('stats-row').classList.add('flex');
    document.getElementById('stats-row').innerHTML = `
      <div class="bg-secondary-container/20 border border-secondary-container/30 p-4 rounded-2xl flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-secondary-container/30 flex items-center justify-center text-secondary">
          <span class="material-symbols-outlined text-xl">payments</span></div>
        <div>
          <p class="text-[9px] font-bold text-on-surface-variant uppercase tracking-wider mb-0.5">Total gagné</p>
          <p class="font-headline text-[22px] text-primary leading-none">${s.gainsTotaux} MAD</p>
        </div>
      </div>
      <div class="bg-surface-container border border-outline-variant/20 p-4 rounded-2xl flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-primary-container/10 flex items-center justify-center text-primary-container">
          <span class="material-symbols-outlined text-xl">local_shipping</span></div>
        <div>
          <p class="text-[9px] font-bold text-on-surface-variant uppercase tracking-wider mb-0.5">Livrées</p>
          <p class="font-headline text-[22px] text-primary leading-none">${s.nbLivraisons}</p>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('stats-skeleton').classList.add('hidden');
  }

  await chargerCommandes();

  // Écoute temps réel des nouvelles commandes
  _refListener = ecouterNouvellesCommandesLivreur(async (_ids, err) => {
    if (!err) await chargerCommandes();
  });
});

window.addEventListener('beforeunload', () => { if (_refListener) stopperEcouteCommandes(_refListener); });

async function chargerCommandes() {
  const sk    = document.getElementById('skeleton-orders');
  const list  = document.getElementById('orders-list');
  const empty = document.getElementById('empty-state');
  const badge = document.getElementById('badge-nb');

  try {
    const commandes = await getCommandesDisponibles();
    commandes.sort((a, b) => new Date(b.dateCreation) - new Date(a.dateCreation));
    sk.classList.add('hidden');

    if (!commandes.length) {
      list.classList.add('hidden'); list.classList.remove('flex');
      empty.classList.remove('hidden'); empty.classList.add('flex');
      badge.classList.add('hidden');
      return;
    }
    empty.classList.add('hidden'); empty.classList.remove('flex');
    list.classList.remove('hidden'); list.classList.add('flex');
    list.innerHTML = '';
    commandes.forEach(c => list.appendChild(buildCard(c)));
    badge.textContent = `${commandes.length} en attente`;
    badge.classList.remove('hidden');
  } catch(e) {
    sk.classList.add('hidden');
    empty.classList.remove('hidden'); empty.classList.add('flex');
    console.error('[commandes]', e);
  }
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date();
  const h = String(d.getHours()).padStart(2,'0'), m = String(d.getMinutes()).padStart(2,'0');
  return d.toDateString() === now.toDateString() ? `Aujourd'hui, ${h}:${m}` : d.toLocaleDateString('fr-FR') + `, ${h}:${m}`;
}

function buildCard(cmd) {
  const div = document.createElement('div');
  div.className = 'order-card';
  const nb      = cmd.nbIngredients ?? cmd.panier?.length ?? 0;
  const adr     = cmd.adresseLivraison?.adresse ?? '—';
  const tel     = cmd.adresseLivraison?.telephone ?? '—';
  const telHref = tel !== '—' ? tel.replace(/\s+/g, '') : '';
  const mode    = cmd.modePaiement === 'carte' ? 'En ligne' : 'À la livraison';
  const temps   = cmd.tempsEstime  ? `${cmd.tempsEstime} min` : '30-45 min';
  const id      = `card-${cmd.id.replace(/[^a-z0-9]/gi,'_')}`;

  div.innerHTML = `
  <div class="p-5">
    <div class="flex justify-between items-start mb-4">
      <div>
        <p class="font-bold text-base text-on-surface">Commande #${cmd.id}</p>
        <p class="text-sm text-on-surface-variant mt-0.5">${fmtDate(cmd.dateCreation)}</p>
      </div>
      <div class="text-right">
        <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider">Total</p>
        <p class="font-headline text-2xl text-primary leading-none mt-0.5">${cmd.prixTotal} MAD</p>
      </div>
    </div>
    <!-- Chips -->
    <div class="flex gap-2 mb-4">
      <div class="flex items-center gap-2 bg-surface-container rounded-2xl px-3 py-2 flex-1">
        <span class="material-symbols-outlined text-on-surface-variant" style="font-size:18px;">credit_card</span>
        <div><p class="text-[9px] font-bold text-on-surface-variant uppercase tracking-wider">Paiement</p><p class="text-sm font-semibold text-on-surface">${mode}</p></div>
      </div>
      <div class="flex items-center gap-2 bg-primary-container/10 rounded-2xl px-3 py-2 flex-1">
        <span class="material-symbols-outlined text-primary-container" style="font-size:18px;">schedule</span>
        <div><p class="text-[9px] font-bold text-on-surface-variant uppercase tracking-wider">Temps estimé</p><p class="text-sm font-semibold text-on-surface">${temps}</p></div>
      </div>
    </div>
    <!-- Details -->
    <div class="flex flex-col gap-2 mb-4">
      <div class="flex items-center gap-2 text-sm text-on-surface-variant">
        <span class="material-symbols-outlined" style="font-size:18px;">shopping_bag</span>
        <span>${nb} ingrédient${nb > 1 ? 's' : ''}</span>
      </div>
      <div class="flex items-center gap-2 text-sm text-on-surface-variant">
        <span class="material-symbols-outlined" style="font-size:18px;">location_on</span>
        <span class="truncate">${adr}</span>
      </div>
      <div class="flex items-center gap-2 text-sm text-on-surface font-semibold">
        <span class="material-symbols-outlined" style="font-size:18px;">phone</span>
        ${telHref ? `<a href="tel:${telHref}" class="text-primary underline underline-offset-4">${tel}</a>` : '<span>—</span>'}
      </div>
    </div>
    <!-- Buttons -->
    <div class="flex gap-2">
      <button id="btn-accept-${id}" onclick="accepter('${cmd.id}', '${id}')"
        class="flex-1 bg-primary text-on-primary py-3.5 rounded-2xl font-bold text-sm uppercase tracking-wider hover:opacity-90 active:scale-95 transition-all">
        Accepter
      </button>
      <button onclick="toggleDetails('${id}')"
        class="flex-1 border-2 border-outline-variant text-on-surface py-3.5 rounded-2xl font-semibold text-sm hover:bg-surface-container transition-colors" id="btn-details-${id}">
        Voir détails
      </button>
    </div>
  </div>
  <!-- Expandable details -->
  <div class="expand-panel" id="expand-${id}">
    <div class="expand-inner border-t border-outline-variant/20 p-5 bg-surface-container/30">
      <!-- Ingrédients -->
      <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider mb-2">Ingrédients</p>
      <div class="flex flex-col gap-1 mb-4">
        ${(cmd.panier || []).map(i => {
          const qte = i.quantitePanier ?? i.quantiteRecette ?? i.quantite ?? 0;
          const unite = i.type === 'pack' ? (i.unite || 'pack') : (i.unite || '');
          return `<p class="text-sm text-on-surface">${i.nom} <span class="text-on-surface-variant">— ${qte} ${unite}</span></p>`;
        }).join('')}
      </div>
      <!-- Points de collecte -->
      ${(cmd.pointsCollecte || []).length ? `
      <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider mb-2">Points de collecte</p>
      <div class="flex flex-col gap-1.5 mb-4">
        ${(cmd.pointsCollecte || []).map(pt => `
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-primary flex-shrink-0"></div>
            <p class="text-sm font-semibold text-on-surface">${pt.label || pt.type}</p>
          </div>`).join('')}
      </div>` : ''}
      <!-- Prix -->
      <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider mb-2">Détails prix</p>
      <div class="bg-surface-container-low rounded-xl p-3 flex flex-col gap-1.5">
        <div class="flex justify-between text-sm"><span class="text-on-surface-variant">Sous-total</span><span class="font-medium">${cmd.sousTotal ?? 0} MAD</span></div>
        <div class="flex justify-between text-sm"><span class="text-on-surface-variant">Frais livraison</span><span class="font-medium">${cmd.fraisLivraison ?? 0} MAD</span></div>
        <div class="flex justify-between text-sm font-bold border-t border-outline-variant/20 pt-1.5 mt-0.5"><span>Total</span><span class="text-primary">${cmd.prixTotal} MAD</span></div>
      </div>
      <!-- Adresse complète -->
      <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider mt-3 mb-1">Adresse complète</p>
      <p class="text-sm text-on-surface italic">${cmd.adresseLivraison?.adresse || ''}, ${cmd.adresseLivraison?.ville || ''}</p>
    </div>
  </div>`;

  return div;
}

window.toggleDetails = function(id) {
  const panel = document.getElementById(`expand-${id}`);
  const btn   = document.getElementById(`btn-details-${id}`);
  const open  = panel.classList.toggle('open');
  btn.textContent = open ? 'Masquer' : 'Voir détails';
  if (open) btn.classList.add('bg-surface-container');
  else btn.classList.remove('bg-surface-container');
};

window.accepter = async function(commandeId, id) {
  const btn = document.getElementById(`btn-accept-${id}`);
  if (!livreurId) { showToast('Erreur : non authentifié', true); return; }
  btn.disabled = true; btn.textContent = 'Acceptation…';
  try {
    await accepterCommande(livreurId, commandeId);
    showToast('Commande acceptée ✓');
    // Animate card out then redirect
    const card = btn.closest('.order-card');
    card.style.transition = 'opacity 0.35s, transform 0.35s';
    card.style.opacity = '0'; card.style.transform = 'translateX(40px)';
    setTimeout(() => {
      card.remove();
      const list = document.getElementById('orders-list');
      if (!list.querySelectorAll('.order-card').length) {
        list.classList.add('hidden'); list.classList.remove('flex');
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('empty-state').classList.add('flex');
        document.getElementById('badge-nb').classList.add('hidden');
      }
      setTimeout(() => window.location.href = '/livreur/en-cours', 700);
    }, 350);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Accepter';
    showToast(e.message || 'Erreur, réessayez', true);
  }
};

function showToast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? '#ba1a1a' : '#012d1d';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

window.confirmerDeconnexion = async () => {
  const { handleLogout } = await import('../../controllers/authController.js');
  await handleLogout();
};
</script>
</body>
</html>
