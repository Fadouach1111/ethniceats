<!DOCTYPE html>
<html class="light" lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EthnicEats — Catégorie</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#012d1d", "on-primary": "#ffffff",
          "primary-container": "#1b4332", "on-primary-container": "#86af99",
          "secondary": "#775a19", "on-secondary": "#ffffff",
          "secondary-container": "#fed488", "on-secondary-container": "#785a1a",
          "tertiary": "#282622", "on-tertiary": "#ffffff",
          "tertiary-container": "#3e3c37",
          "background": "#fcf9f8", "on-background": "#1b1c1c",
          "surface": "#fcf9f8", "on-surface": "#1b1c1c",
          "surface-variant": "#e5e2e1", "on-surface-variant": "#414844",
          "surface-container-lowest": "#ffffff",
          "surface-container-low": "#f6f3f2",
          "surface-container": "#f0eded",
          "surface-container-high": "#eae7e7",
          "surface-container-highest": "#e5e2e1",
          "outline": "#717973", "outline-variant": "#c1c8c2",
          "inverse-primary": "#a5d0b9",
          "inverse-surface": "#303030",
          "inverse-on-surface": "#f3f0ef",
          "error": "#ba1a1a", "on-error": "#ffffff",
          "error-container": "#ffdad6", "on-error-container": "#93000a",
          "surface-dim": "#dcd9d9", "surface-bright": "#fcf9f8",
          "primary-fixed": "#c1ecd4", "primary-fixed-dim": "#a5d0b9",
          "secondary-fixed": "#ffdea5", "secondary-fixed-dim": "#e9c176",
        },
        borderRadius: { DEFAULT: "0.5rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
        fontFamily: {
          headline: ["Playfair Display", "serif"],
          display: ["Playfair Display", "serif"],
          body: ["Manrope", "sans-serif"],
          label: ["Manrope", "sans-serif"]
        }
      }
    }
  }
</script>
<style>
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { min-height: 100dvh; font-family: 'Manrope', sans-serif; }
  h2, h3, h4 { font-family: 'Playfair Display', serif; }
  .recipe-card:hover img { transform: scale(1.08); }
  .recipe-card img { transition: transform 0.7s ease; }
  .nav-item { color: #9ca3af; }
  .nav-item.active { color: #012d1d; font-weight: 700; background: rgba(1,45,29,0.05); border-radius: 1rem; transform: scale(1.1); }
  .nav-item.active .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  @media (min-width: 1024px) {
    #bottom-nav { display: none; }
    #sidebar-nav { display: flex; }
  }
  @media (max-width: 1023px) {
    #sidebar-nav { display: none; }
    #bottom-nav { display: flex; }
  }
</style>
</head>
<body class="bg-surface text-on-surface selection:bg-secondary-container">

<!-- Desktop Sidebar -->
<nav id="sidebar-nav" class="fixed left-0 top-0 h-full w-64 bg-surface-container-low border-r border-outline-variant/20 flex-col items-start px-4 py-10 gap-2 z-40">
  <div class="mb-8 px-2">
    <h1 class="font-headline text-2xl text-primary font-bold">EthnicEats</h1>
  </div>
  <a href="/accueil" class="flex items-center gap-3 w-full px-4 py-3 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-colors">
    <span class="material-symbols-outlined">home</span> Accueil
  </a>
  <a href="/panier" class="flex items-center gap-3 w-full px-4 py-3 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-colors">
    <span class="material-symbols-outlined">shopping_bag</span> Panier
  </a>
  <a href="/suivi-commande" class="flex items-center gap-3 w-full px-4 py-3 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-colors">
    <span class="material-symbols-outlined">local_shipping</span> Suivi
  </a>
  <a href="/profil-client" class="flex items-center gap-3 w-full px-4 py-3 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-colors">
    <span class="material-symbols-outlined">person</span> Profil
  </a>
</nav>

<main class="lg:ml-64 pb-32 w-full">

  <!-- Header -->
  <section class="px-6 md:px-8 pt-8 pb-3">
    <a class="inline-flex items-center justify-center w-10 h-10 -ml-2 text-primary hover:bg-surface-container-low rounded-full transition-colors" href="/accueil">
      <span class="material-symbols-outlined text-3xl">arrow_back</span>
    </a>
    <h2 id="page-title" class="font-display font-bold text-4xl tracking-tight text-primary mt-2">Cuisine</h2>
  </section>

  <!-- Search -->
  <section class="px-6 md:px-8 mb-6">
    <div class="relative group w-full lg:max-w-xl">
      <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
      <input id="search-input" class="w-full bg-surface-container-low border-none rounded-2xl py-4 pl-12 pr-6 text-on-surface focus:ring-2 focus:ring-primary/20 placeholder:text-outline transition-all duration-300" placeholder="Rechercher une recette..." type="text"/>
    </div>
  </section>

  <!-- Populaires -->
  <section class="mb-8">
    <div class="flex justify-between items-end px-6 md:px-8 mb-4">
      <h3 class="font-display font-bold text-2xl text-primary">Plats populaires</h3>
    </div>
    <div id="populaires-list" class="flex overflow-x-auto lg:grid lg:grid-cols-3 no-scrollbar gap-5 px-6 md:px-8 lg:gap-8">
      <!-- Skeleton -->
      <div class="flex gap-5 animate-pulse">
        <div class="flex-none w-64 h-96 bg-surface-container rounded-3xl"></div>
        <div class="flex-none w-64 h-96 bg-surface-container rounded-3xl"></div>
        <div class="flex-none w-64 h-96 bg-surface-container rounded-3xl"></div>
      </div>
    </div>
  </section>

  <!-- Autres recettes -->
  <section class="px-6 md:px-8 w-full">
    <h3 class="font-display font-bold text-2xl text-primary mb-4">Autres recettes</h3>
    <div id="autres-list" class="grid grid-cols-1 lg:grid-cols-2 gap-y-2 gap-x-6">
      <!-- Chargé dynamiquement -->
    </div>
    <!-- État vide -->
    <div id="empty-state" class="hidden text-center py-16">
      <span class="material-symbols-outlined text-5xl text-outline mb-3">search_off</span>
      <p class="text-on-surface-variant">Aucune recette trouvée</p>
    </div>
  </section>

</main>

<!-- Bottom Nav (mobile) -->
<nav id="bottom-nav" class="fixed bottom-0 left-0 w-full z-50 justify-around items-center px-4 pb-8 pt-4 bg-[#fcf9f8]/90 backdrop-blur-2xl rounded-t-[2rem] shadow-[0_-12px_32px_rgba(27,28,28,0.04)] text-[11px] font-medium uppercase tracking-widest">
  <a id="nav-accueil" class="nav-item flex flex-col items-center justify-center px-4 py-2 transition-all" href="/accueil">
    <span class="material-symbols-outlined mb-1">home</span><span>Accueil</span>
  </a>
  <a id="nav-panier" class="nav-item flex flex-col items-center justify-center px-4 py-2 transition-all" href="/panier">
    <span class="material-symbols-outlined mb-1">shopping_bag</span><span>Panier</span>
  </a>
  <a id="nav-suivi" class="nav-item flex flex-col items-center justify-center px-4 py-2 transition-all" href="/suivi-commande">
    <span class="material-symbols-outlined mb-1">local_shipping</span><span>Suivi</span>
  </a>
  <a id="nav-profil" class="nav-item flex flex-col items-center justify-center px-4 py-2 transition-all" href="/profil-client">
    <span class="material-symbols-outlined mb-1">person</span><span>Profil</span>
  </a>
</nav>

<script type="module">
import { protegerPage } from '../../controllers/authController.js';
import { getRecettesParCategorie, getRecettesPopulaires } from '../../controllers/recetteController.js';

// ─── Auth guard ───────────────────────────────────────────────────────────────
// const utilisateur = await protegerPage('client');
// if (!utilisateur) throw new Error('Redirection');
const utilisateur = { nomComplet: 'vous' };

// ─── Catégorie depuis l'URL ───────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const categorie = params.get('cat') || 'Marocain';

const TITRES_CUISINES = {
  marocain: 'Cuisine marocaine',
  italien: 'Cuisine italienne',
  japonais: 'Cuisine japonaise',
  chinois: 'Cuisine chinoise',
  coreen: 'Cuisine coréenne',
  coréen: 'Cuisine coréenne',
  vietnamien: 'Cuisine vietnamienne',
  indien: 'Cuisine indienne',
  mexicain: 'Cuisine mexicaine',
  espagnol: 'Cuisine espagnole',
  francais: 'Cuisine française',
  français: 'Cuisine française',
};

document.getElementById('page-title').textContent = TITRES_CUISINES[categorie.toLowerCase()] || `Cuisine ${categorie.toLowerCase()}`;
document.title = `EthnicEats — ${categorie}`;

// ─── Charger toutes les recettes de la catégorie ──────────────────────────────
const toutesRecettes = await getRecettesParCategorie(categorie);

// ─── Populaires ───────────────────────────────────────────────────────────────
function afficherPopulaires(recettes) {
  const populaires = recettes.filter(r => r.populaire).slice(0, 3);
  const container = document.getElementById('populaires-list');
  container.innerHTML = '';

  if (!populaires.length) {
    container.closest('section').classList.add('hidden');
    return;
  }

  populaires.forEach(r => {
    const card = document.createElement('div');
    card.className = 'recipe-card flex-none w-64 lg:w-full group cursor-pointer';
    card.onclick = () => window.location.href = `/recette-detail?id=${r.id}`;
    card.innerHTML = `
      <div class="relative h-[22rem] lg:h-[28rem] w-full rounded-3xl overflow-hidden mb-3 shadow-[0px_12px_32px_rgba(27,28,28,0.08)]">
        <img class="h-full w-full object-cover" src="${r.image || ''}" alt="${r.titre}"/>
      </div>
      <h4 class="font-display font-bold text-xl text-primary mb-1">${r.titre}</h4>
      <p class="text-on-surface-variant text-sm leading-relaxed line-clamp-2">${r.descriptionCourte || r.description || ''}</p>
    `;
    container.appendChild(card);
  });
}

// ─── Autres recettes ──────────────────────────────────────────────────────────
function afficherAutres(recettes) {
  const autres = recettes.filter(r => !r.populaire);
  const container = document.getElementById('autres-list');
  const emptyState = document.getElementById('empty-state');
  container.innerHTML = '';

  if (!autres.length) {
    emptyState.classList.remove('hidden');
    return;
  }
  emptyState.classList.add('hidden');

  autres.forEach(r => {
    const item = document.createElement('div');
    item.className = 'flex gap-4 items-start p-2 -ml-2 rounded-3xl hover:bg-surface-container-low transition-all duration-300 cursor-pointer';
    item.onclick = () => window.location.href = `/recette-detail?id=${r.id}`;
    item.innerHTML = `
      <div class="w-20 h-20 flex-shrink-0 rounded-2xl overflow-hidden bg-surface-container shadow-sm">
        <img class="w-full h-full object-cover" src="${r.image || ''}" alt="${r.titre}"/>
      </div>
      <div class="flex flex-col pt-0.5 flex-1">
        <h4 class="font-display font-bold text-lg text-primary mb-0.5">${r.titre}</h4>
        <p class="text-on-surface-variant text-xs leading-relaxed line-clamp-2">${r.descriptionCourte || r.description || ''}</p>
        <div class="flex items-center gap-2 mt-1">
          <span class="material-symbols-outlined text-sm text-outline" style="font-size:14px">schedule</span>
          <span class="text-xs text-on-surface-variant">${r.tempsPreparation || ''}</span>
          <span class="mx-1 text-outline-variant">·</span>
          <span class="text-xs text-on-surface-variant capitalize">${r.difficulte || ''}</span>
        </div>
      </div>
    `;
    container.appendChild(item);
  });
}

afficherPopulaires(toutesRecettes);
afficherAutres(toutesRecettes);

// ─── Recherche locale ─────────────────────────────────────────────────────────
let searchTimeout;
document.getElementById('search-input').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const q = e.target.value.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    if (!q) {
      afficherPopulaires(toutesRecettes);
      afficherAutres(toutesRecettes);
      return;
    }
    const filtered = toutesRecettes.filter(r => {
      const titre = r.titre.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      return titre.includes(q) || (r.ingredients || []).some(i =>
        i.nom.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').includes(q)
      );
    });
    afficherPopulaires(filtered);
    afficherAutres(filtered);
  }, 200);
});
</script>
</body>
</html>
