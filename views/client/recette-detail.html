<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  body { font-family: 'Manrope', sans-serif; }
  h1, h2, h3 { font-family: 'Playfair Display', serif; }

  .sidebar-item { color: #9ca3af; transition: all 0.2s; }
  .sidebar-item:hover { color: #012d1d; background: rgba(1,45,29,0.05); border-radius: 1rem; }
  .sidebar-item.active { color: #012d1d; font-weight: 700; background: rgba(1,45,29,0.07); border-radius: 1rem; }
  .sidebar-item.active .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  .tab-btn { border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab-btn.active { border-bottom-color: #012d1d; color: #012d1d; font-weight: 700; }

  .fav-active { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; color: #e53e3e !important; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .skeleton { animation: pulse 1.5s ease-in-out infinite; background: #e5e2e1; border-radius: 0.5rem; }

  .ing-icon { width: 48px; height: 48px; flex-shrink: 0; }

<body class="bg-surface text-on-surface min-h-screen">

<!-- ===== SIDEBAR DESKTOP UNIQUEMENT ===== -->
<nav class="hidden lg:flex fixed left-0 top-0 h-full w-64 bg-surface-container-low border-r border-outline-variant/20 flex-col items-start px-4 py-10 gap-2 z-40">
  <div class="mb-8 px-2">
    <h1 class="font-headline text-2xl text-primary font-bold">EthnicEats</h1>
  </div>
  <a href="/accueil" class="sidebar-item flex items-center gap-3 w-full px-4 py-3 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-colors">
    <span class="material-symbols-outlined">home</span>Accueil
  </a>
  <a href="/panier" class="sidebar-item flex items-center gap-3 w-full px-4 py-3 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-colors">
    <span class="material-symbols-outlined">shopping_bag</span>Panier
  </a>
  <a href="/suivi-commande" class="sidebar-item flex items-center gap-3 w-full px-4 py-3 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-colors">
    <span class="material-symbols-outlined">local_shipping</span>Suivi
  </a>
  <a href="/profil-client" class="sidebar-item flex items-center gap-3 w-full px-4 py-3 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-colors">
    <span class="material-symbols-outlined">person</span>Profil
  </a>
</nav>

<!-- ===== CONTENU PRINCIPAL ===== -->
<main class="lg:ml-64 min-h-screen pb-12">

  <!-- Header mobile -->
  <header class="sticky top-0 z-30 bg-surface/90 backdrop-blur-md flex justify-between items-center px-4 py-3 lg:hidden border-b border-outline-variant/10">
    <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors text-primary">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <span class="font-headline text-lg text-primary font-bold">EthnicEats</span>
    <button onclick="toggleFavoris()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors">
      <span id="fav-icon-mobile" class="material-symbols-outlined text-primary">favorite</span>
    </button>
  </header>

  <!-- Header desktop -->
  <div class="hidden lg:flex justify-between items-center px-10 pt-8 pb-4">
    <button onclick="history.back()" class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors font-medium text-sm">
      <span class="material-symbols-outlined">arrow_back</span>Retour
    </button>
    <button onclick="toggleFavoris()" class="flex items-center gap-2 px-4 py-2 rounded-full border border-outline-variant hover:bg-surface-container transition-colors text-on-surface-variant text-sm font-medium">
      <span id="fav-icon-desktop" class="material-symbols-outlined text-[18px]">favorite</span>
      <span id="fav-label">Ajouter aux favoris</span>
    </button>
  </div>

  <!-- SKELETON -->
  <div id="skeleton" class="px-4 lg:px-10 pt-4 max-w-5xl">
    <div class="flex flex-col lg:flex-row gap-8 mb-8">
      <div class="skeleton w-full lg:w-72 aspect-square rounded-3xl max-w-[280px] mx-auto lg:mx-0"></div>
      <div class="flex-1 space-y-4">
        <div class="skeleton h-10 w-2/3 rounded-xl"></div>
        <div class="skeleton h-4 w-full rounded"></div>
        <div class="skeleton h-4 w-5/6 rounded"></div>
        <div class="skeleton h-4 w-4/6 rounded"></div>
        <div class="flex gap-3 mt-6">
          <div class="skeleton h-20 w-28 rounded-2xl"></div>
          <div class="skeleton h-20 w-28 rounded-2xl"></div>
          <div class="skeleton h-20 w-28 rounded-2xl"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RECETTE CHARGÉE -->
  <div id="recette-content" class="hidden px-4 lg:px-10 max-w-5xl">

    <!-- Hero -->
    <section class="flex flex-col lg:flex-row gap-8 mb-10">
      <div class="flex-shrink-0 w-full lg:w-72 xl:w-80">
        <div class="relative w-full aspect-square max-w-[280px] mx-auto lg:mx-0">
          <img id="recette-image" alt="" class="w-full h-full rounded-3xl object-cover shadow-xl"/>
          <span id="recette-badge" class="absolute top-3 left-3 bg-primary/90 text-on-primary text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full"></span>
        </div>
      </div>
      <div class="flex-1 flex flex-col justify-center">
        <h1 id="recette-titre" class="font-headline text-3xl lg:text-4xl xl:text-5xl text-primary mb-3 leading-tight"></h1>
        <div class="mb-4">
          <p id="recette-desc" class="text-on-surface-variant text-sm lg:text-base leading-relaxed line-clamp-4 lg:line-clamp-none"></p>
          <button id="voir-plus-btn" onclick="toggleDesc()" class="text-primary font-semibold text-sm underline mt-1 lg:hidden">Voir plus</button>
        </div>
        <!-- Infos rapides -->
        <div class="grid grid-cols-3 gap-3 mt-2">
          <div class="bg-surface-container-low border border-outline-variant/20 rounded-2xl p-3 flex flex-col items-center text-center">
            <span class="material-symbols-outlined text-primary mb-1 text-xl" style="font-variation-settings:'wght' 300">analytics</span>
            <p class="text-[9px] uppercase tracking-widest text-on-surface-variant font-bold mb-0.5">Difficulté</p>
            <p id="recette-difficulte" class="font-bold text-primary text-[11px] lg:text-sm capitalize"></p>
          </div>
          <div class="bg-surface-container-low border border-outline-variant/20 rounded-2xl p-3 flex flex-col items-center text-center">
            <span class="material-symbols-outlined text-primary mb-1 text-xl" style="font-variation-settings:'wght' 300">schedule</span>
            <p class="text-[9px] uppercase tracking-widest text-on-surface-variant font-bold mb-0.5">Temps</p>
            <p id="recette-temps" class="font-bold text-primary text-[11px] lg:text-sm"></p>
          </div>
          <div class="bg-surface-container-low border border-outline-variant/20 rounded-2xl p-3 flex flex-col items-center text-center">
            <span class="material-symbols-outlined text-primary mb-1 text-xl" style="font-variation-settings:'wght' 300">people</span>
            <p class="text-[9px] uppercase tracking-widest text-on-surface-variant font-bold mb-0.5">Portions</p>
            <p id="recette-portions" class="font-bold text-primary text-[11px] lg:text-sm"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- TABS -->
    <section>
      <div class="flex gap-10 border-b border-outline-variant/20 mb-6">
        <button id="tab-ing" onclick="switchTab('ingredients')" class="tab-btn active text-primary pb-3 text-sm lg:text-base font-medium tracking-wide">
          Ingrédients
        </button>
        <button id="tab-inst" onclick="switchTab('instructions')" class="tab-btn text-on-surface-variant pb-3 text-sm lg:text-base font-medium tracking-wide">
          Instructions
        </button>
      </div>

      <!-- Panel Ingrédients -->
      <div id="panel-ingredients">
        <div class="flex items-center gap-3 mb-5">
          <span class="text-on-surface-variant text-sm font-medium">Pour :</span>
          <div class="flex items-center gap-3 bg-surface-container-low rounded-full px-4 py-2 border border-outline-variant/20">
            <button onclick="changePortions(-1)" class="w-7 h-7 rounded-full bg-surface flex items-center justify-center text-primary shadow-sm hover:bg-white transition-all border border-outline-variant/20 active:scale-90">
              <span class="material-symbols-outlined text-sm">remove</span>
            </button>
            <span id="portions-count" class="font-bold text-primary text-sm min-w-[20px] text-center">4</span>
            <span class="text-on-surface-variant text-sm">pers.</span>
            <button onclick="changePortions(1)" class="w-7 h-7 rounded-full bg-surface flex items-center justify-center text-primary shadow-sm hover:bg-white transition-all border border-outline-variant/20 active:scale-90">
              <span class="material-symbols-outlined text-sm">add</span>
            </button>
          </div>
        </div>

        <ul id="ingredients-list" class="space-y-3 mb-6"></ul>

        <div class="p-4 bg-primary/5 rounded-2xl border border-primary/10 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
          <div>
            <p class="text-on-surface-variant text-xs uppercase tracking-widest font-bold mb-1">Total estimé</p>
            <p id="prix-total" class="text-primary font-bold text-2xl"></p>
          </div>
          <button onclick="ajouterAuPanier()" id="add-to-cart-btn" class="w-full sm:w-auto bg-primary text-on-primary rounded-full px-6 py-3 flex items-center justify-center gap-2 font-semibold text-sm hover:opacity-90 transition-all shadow-lg shadow-primary/10 active:scale-[0.97]">
            <span class="material-symbols-outlined text-[18px]">shopping_bag</span>
            <span class="uppercase tracking-wide">Ajouter au panier</span>
          </button>
        </div>
      </div>

      <!-- Panel Instructions -->
      <div id="panel-instructions" class="hidden">
        <ol id="instructions-list" class="space-y-5 max-w-2xl"></ol>
      </div>
    </section>
  </div>

  <!-- Erreur -->
  <div id="error-state" class="hidden flex flex-col items-center justify-center min-h-[60vh] text-center px-6">
    <span class="material-symbols-outlined text-6xl text-outline mb-4">sentiment_dissatisfied</span>
    <p class="text-on-surface-variant text-lg font-medium mb-4">Recette introuvable</p>
    <a href="/accueil" class="bg-primary text-on-primary rounded-full px-6 py-3 font-semibold text-sm">Retour à l'accueil</a>
  </div>

</main>

function getIconeSVG(icone) {
  if (!icone) return ICONES['default'];
  const key = icone.toLowerCase().replace(/_/g, '-');
  return ICONES[key] || ICONES['default'];
}

// ===== ÉTAT =====
let recette = null;
let portionsActuelles = 4;
let isFavori = false;
let descExpanded = false;
let clientId = null;

function _getPreferences() {
  try {
    const raw = localStorage.getItem('ethniceats_preferences');
    return raw ? JSON.parse(raw) : { sourcePreferee: 'mix', budget: 'moyen', priorite: 'moins_cher' };
  } catch (e) {
    return { sourcePreferee: 'mix', budget: 'moyen', priorite: 'moins_cher' };
  }
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', async () => {
  await setupEmailVerificationBanner();
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { showError(); return; }
  try {
    try {
      const user = await getCurrentUser();
      clientId = user?.uid || null;
    } catch { clientId = null; }

    recette = await getRecetteById(id);
    if (!recette) { showError(); return; }
    portionsActuelles = recette.portions || 4;
    renderRecette();
    await checkFavori();
    document.getElementById('skeleton').classList.add('hidden');
    document.getElementById('recette-content').classList.remove('hidden');
    document.title = `EthnicEats — ${recette.titre}`;
  } catch(e) {
    console.error(e);
    showError();
  }
});

function showError() {
  document.getElementById('skeleton').classList.add('hidden');
  document.getElementById('error-state').classList.remove('hidden');
}

function renderRecette() {
  document.getElementById('recette-image').src = recette.image || '';
  document.getElementById('recette-image').alt = recette.titre;
  document.getElementById('recette-titre').textContent = recette.titre;
  document.getElementById('recette-desc').textContent = recette.descriptionLongue || recette.descriptionCourte || '';
  document.getElementById('recette-badge').textContent = recette.categorie || '';
  document.getElementById('recette-difficulte').textContent = recette.difficulte || '—';
  document.getElementById('recette-temps').textContent = recette.tempsPreparation || '—';
  document.getElementById('recette-portions').textContent = `${recette.portions || 4} pers.`;
  document.getElementById('portions-count').textContent = portionsActuelles;
  renderIngredients();
  renderInstructions();
}

function renderIngredients() {
  const ratio = portionsActuelles / (recette.portions || 4);
  const list = document.getElementById('ingredients-list');
  let total = 0;
  list.innerHTML = (recette.ingredients || []).map(ing => {
    const qte = Math.round(ing.quantiteRecette * ratio * 10) / 10;
    const prix = Math.round((ing.prix || 0) * ratio);
    total += prix;
    return `
      <li class="flex items-center gap-4 p-3 bg-surface-container-low rounded-2xl border border-outline-variant/15 hover:bg-surface-container transition-colors">
        <div class="ing-icon">${getIconeSVG(ing.icone)}</div>
        <div class="flex-1 min-w-0">
          <p class="font-semibold text-on-surface text-sm truncate">${ing.nom}</p>
          <p class="text-on-surface-variant text-xs">${qte} ${ing.unite}</p>
        </div>
        <p class="font-bold text-primary text-sm flex-shrink-0">${prix} Dh</p>
      </li>`;
  }).join('');
  document.getElementById('prix-total').textContent = `${total} Dh`;
}

function renderInstructions() {
  const list = document.getElementById('instructions-list');
  list.innerHTML = (recette.etapes || []).map((etape, i) => {
    const texte = etape.replace(/^\d+\.\s*/, '');
    return `
      <li class="flex gap-4">
        <span class="flex-shrink-0 w-9 h-9 rounded-full bg-primary/10 text-primary flex items-center justify-center font-bold text-sm">${i + 1}</span>
        <p class="flex-1 pt-1 text-on-surface text-sm lg:text-base leading-relaxed">${texte}</p>
      </li>`;
  }).join('');
}

// ===== ONGLETS =====
window.switchTab = function(tab) {
  const isIng = tab === 'ingredients';
  document.getElementById('panel-ingredients').classList.toggle('hidden', !isIng);
  document.getElementById('panel-instructions').classList.toggle('hidden', isIng);
  document.getElementById('tab-ing').classList.toggle('active', isIng);
  document.getElementById('tab-inst').classList.toggle('active', !isIng);
  document.getElementById('tab-ing').classList.toggle('text-primary', isIng);
  document.getElementById('tab-inst').classList.toggle('text-primary', !isIng);
  document.getElementById('tab-ing').classList.toggle('text-on-surface-variant', !isIng);
  document.getElementById('tab-inst').classList.toggle('text-on-surface-variant', isIng);
};

window.changePortions = function(delta) {
  portionsActuelles = Math.max(1, portionsActuelles + delta);
  document.getElementById('portions-count').textContent = portionsActuelles;
  renderIngredients();
};

window.toggleDesc = function() {
  descExpanded = !descExpanded;
  document.getElementById('recette-desc').classList.toggle('line-clamp-4', !descExpanded);
  document.getElementById('voir-plus-btn').textContent = descExpanded ? 'Voir moins' : 'Voir plus';
};

function _lireFavorisLocal() {
  try {
    const raw = localStorage.getItem('favoris');
    const ids = raw ? JSON.parse(raw) : [];
    return Array.isArray(ids) ? ids.filter(Boolean) : [];
  } catch {
    return [];
  }
}

function _ecrireFavorisLocal(ids) {
  try {
    const uniques = Array.from(new Set((ids ?? []).filter(Boolean)));
    localStorage.setItem('favoris', JSON.stringify(uniques));
  } catch {}
}

async function checkFavori() {
  if (!recette?.id) return;

  // Si connecté : Firestore est la source de vérité
  if (clientId) {
    try {
      const res = await isFavoriFS(clientId, recette.id);
      if (res?.success !== true) throw new Error(res?.message || 'isFavori: impossible');
      isFavori = !!res.estFavori;
      // miroir local pour cohérence UI / pages offline
      const favs = _lireFavorisLocal();
      if (isFavori && !favs.includes(recette.id)) _ecrireFavorisLocal([...favs, recette.id]);
      if (!isFavori && favs.includes(recette.id)) _ecrireFavorisLocal(favs.filter(id => id !== recette.id));
      updateFavUI();
      return;
    } catch {
      // si Firestore échoue, fallback localStorage
    }
  }

  const favs = _lireFavorisLocal();
  isFavori = favs.includes(recette.id);
  updateFavUI();
}

window.toggleFavoris = async function() {
  if (!recette?.id) return;

  // Si connecté : on bascule côté Firestore
  if (clientId) {
    try {
      const res = await toggleFavoriFS(clientId, recette.id);
      if (res?.success !== true) throw new Error(res?.message || 'toggleFavori: impossible');
      isFavori = !!res.estFavori;

      const favs = _lireFavorisLocal();
      if (isFavori) _ecrireFavorisLocal([...favs, recette.id]);
      else _ecrireFavorisLocal(favs.filter(id => id !== recette.id));

      updateFavUI();
      return;
    } catch {
      // fallback localStorage
    }
  }

  const favs = _lireFavorisLocal();
  const next = isFavori ? favs.filter(id => id !== recette.id) : [...favs, recette.id];
  _ecrireFavorisLocal(next);
  isFavori = !isFavori;
  updateFavUI();
};

function updateFavUI() {
  const active = 'fav-active';
  document.getElementById('fav-icon-mobile')?.classList.toggle(active, isFavori);
  document.getElementById('fav-icon-desktop')?.classList.toggle(active, isFavori);
  const label = document.getElementById('fav-label');
  if (label) label.textContent = isFavori ? 'Retirer des favoris' : 'Ajouter aux favoris';
}

window.ajouterAuPanier = async function() {
  if (!recette) return;
  try {
    const preferences = _getPreferences();
    await initialiserPanier(recette, portionsActuelles, preferences);

    // Nettoyage : évite que d'anciennes versions (legacy) gardent un panier divergent.
    try { localStorage.removeItem('panier'); } catch (e) {}

    const btn = document.getElementById('add-to-cart-btn');
    const orig = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">check</span><span class="uppercase tracking-wide">Ajouté !</span>';
    btn.classList.add('bg-green-700');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('bg-green-700'); }, 1800);
  } catch(e) { console.error(e); }
};
</script>
