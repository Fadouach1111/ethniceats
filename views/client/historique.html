<!DOCTYPE html>
<html class="light" lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EthnicEats - Historique recettes</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode:"class",
    theme:{ extend:{ colors:{
      "primary":"#012d1d","on-primary":"#ffffff","primary-container":"#1b4332",
      "primary-fixed":"#c1ecd4","primary-fixed-dim":"#a5d0b9","on-primary-fixed":"#002114",
      "on-primary-fixed-variant":"#274e3d","on-primary-container":"#86af99","inverse-primary":"#a5d0b9",
      "secondary":"#775a19","on-secondary":"#ffffff","secondary-container":"#fdd587","on-secondary-container":"#785a19",
      "secondary-fixed":"#ffdea3","secondary-fixed-dim":"#e8c176","on-secondary-fixed":"#261900",
      "surface":"#fbf9f8","surface-dim":"#dbdad9","surface-bright":"#fbf9f8",
      "surface-container-lowest":"#ffffff","surface-container-low":"#f5f3f3",
      "surface-container":"#efeded","surface-container-high":"#e9e8e7",
      "surface-container-highest":"#e3e2e2","surface-variant":"#e3e2e2",
      "on-surface":"#1b1c1c","on-surface-variant":"#414844",
      "background":"#fbf9f8","outline":"#717973","outline-variant":"#c1c8c2",
      "error":"#ba1a1a","error-container":"#ffdad6","on-error":"#ffffff","on-error-container":"#93000a",
      "inverse-surface":"#303030","inverse-on-surface":"#f2f0f0",
      "tertiary":"#282622","on-tertiary":"#ffffff","tertiary-container":"#3e3b37",
      "on-tertiary-container":"#aaa59f","surface-tint":"#3f6653",
    }, borderRadius:{ DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px" },
    fontFamily:{ headline:["Playfair Display","serif"], body:["Manrope","sans-serif"] }
    }}
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  body { font-family:'Manrope',sans-serif; background:#fbf9f8; }
  h1,h2,h3 { font-family:'Playfair Display',serif; }
  .sidebar-item { color:#9ca3af; transition:all 0.2s; }
  .sidebar-item:hover { color:#012d1d; background:rgba(1,45,29,0.05); border-radius:1rem; }
  .sidebar-item.active { color:#012d1d; font-weight:700; background:rgba(1,45,29,0.07); border-radius:1rem; }
  .sidebar-item.active .material-symbols-outlined { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .skeleton { animation:pulse 1.5s ease-in-out infinite; background:#e5e2e1; border-radius:0.75rem; }
  @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .hist-card { animation:slideIn 0.25s ease-out both; }
  .details-panel { max-height:0; overflow:hidden; transition:max-height 0.3s ease-out; }
  .hist-card.open .details-panel { max-height:600px; }
</style>
</head>
<body class="min-h-screen text-on-surface">

<nav class="hidden lg:flex fixed left-0 top-0 h-full w-64 bg-surface-container-low border-r border-outline-variant/20 flex-col items-start px-4 py-10 gap-2 z-40">
  <div class="mb-8 px-2"><h1 class="font-headline text-2xl text-primary font-bold">EthnicEats</h1></div>
  <a href="/accueil" class="sidebar-item flex items-center gap-3 w-full px-4 py-3 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-colors"><span class="material-symbols-outlined">home</span>Accueil</a>
  <a href="/panier" class="sidebar-item flex items-center gap-3 w-full px-4 py-3 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-colors"><span class="material-symbols-outlined">shopping_bag</span>Panier</a>
  <a href="/suivi-commande" class="sidebar-item flex items-center gap-3 w-full px-4 py-3 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-colors"><span class="material-symbols-outlined">local_shipping</span>Suivi</a>
  <a href="/profil-client" class="sidebar-item active flex items-center gap-3 w-full px-4 py-3 rounded-2xl"><span class="material-symbols-outlined">person</span>Profil</a>
</nav>

<main class="lg:ml-64 min-h-screen flex flex-col">
  <header class="sticky top-0 z-30 bg-surface/90 backdrop-blur-md border-b border-outline-variant/10 px-5 lg:px-10 h-16 flex items-center gap-4">
    <a href="/profil-client" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors text-primary flex-shrink-0">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <h1 class="font-headline text-xl text-primary font-bold lg:flex-1 lg:text-center lg:pr-10">Historique des recettes</h1>
  </header>

  <div id="skeleton" class="px-5 lg:px-10 pt-6 space-y-4 max-w-4xl lg:mx-auto w-full">
    <div class="skeleton h-56 w-full"></div>
    <div class="skeleton h-56 w-full"></div>
  </div>

  <div id="empty-state" class="hidden flex-1 flex flex-col items-center justify-center text-center px-6 py-12">
    <div class="relative mb-8">
      <div class="w-32 h-32 bg-primary-fixed-dim/20 rounded-full flex items-center justify-center">
        <span class="material-symbols-outlined text-primary-fixed-dim" style="font-size:64px;font-variation-settings:'wght' 200">skillet</span>
      </div>
      <div class="absolute -bottom-2 -right-2 w-12 h-12 bg-surface-container-lowest shadow-lg rounded-full flex items-center justify-center">
        <span class="material-symbols-outlined text-secondary text-2xl" style="font-variation-settings:'wght' 200">history</span>
      </div>
    </div>
    <div class="space-y-3 max-w-xs">
      <h2 class="font-headline text-2xl text-primary font-bold">Aucune recette commandee</h2>
      <p class="text-on-surface-variant text-sm leading-relaxed">Vos recettes apparaitront ici apres livraison. Commencez par explorer nos recettes !</p>
    </div>
    <a href="/accueil" class="mt-8 w-full max-w-[280px] bg-primary text-on-primary rounded-full py-4 font-semibold text-sm uppercase tracking-widest shadow-xl shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all text-center block">
      Explorer les recettes
    </a>
  </div>

  <div id="filled-state" class="hidden px-5 lg:px-10 pt-6 pb-10 max-w-4xl lg:mx-auto w-full space-y-5"></div>
</main>

<script type="module">
import { getHistorique } from '../../controllers/clientController.js';
import { getAllRecettes, getRecetteById } from '../../controllers/recetteController.js';
import { getCurrentUser } from '../../services/authService.js';

let clientId = 'client_anonymous';
let toutesRecettes = [];

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const user = await getCurrentUser();
    if (user?.uid) clientId = user.uid;
  } catch (e) {}
  try {
    toutesRecettes = await getAllRecettes();
  } catch (e) {}
  await charger();
});

async function charger() {
  try {
    const result = await getHistorique(clientId);
    const hist = await Promise.all((result.historique ?? []).map(enrichirCommandeHistorique));
    document.getElementById('skeleton').classList.add('hidden');
    if (!hist.length) {
      afficherVide();
      return;
    }
    afficherHistorique(hist);
  } catch (e) {
    console.error('[historique]', e);
    document.getElementById('skeleton').classList.add('hidden');
    afficherVide();
  }
}

function afficherVide() {
  document.getElementById('empty-state').classList.remove('hidden');
  document.getElementById('empty-state').classList.add('flex');
}

async function enrichirCommandeHistorique(commande) {
  const enrichie = { ...commande };

  if (!enrichie.recetteId) {
    const recetteTrouvee = retrouverRecetteDepuisCommande(enrichie);
    if (recetteTrouvee) {
      enrichie.recetteId = recetteTrouvee.id;
      enrichie.recetteTitre = enrichie.recetteTitre || recetteTrouvee.titre;
      enrichie.categorie = enrichie.categorie || recetteTrouvee.categorie;
      enrichie.image = enrichie.image || recetteTrouvee.image;
    }
  }

  if (!enrichie.recetteId) return enrichie;

  try {
    const recette = await getRecetteById(enrichie.recetteId);
    if (recette) {
      enrichie.recetteTitre = enrichie.recetteTitre || recette.titre;
      enrichie.categorie = enrichie.categorie || recette.categorie;
      enrichie.image = enrichie.image || recette.image;
    }
  } catch (e) {}

  return enrichie;
}

function retrouverRecetteDepuisCommande(commande) {
  if (!Array.isArray(toutesRecettes) || !toutesRecettes.length) return null;

  if (commande.recetteTitre) {
    const parTitre = toutesRecettes.find((r) => (r.titre || '').toLowerCase() === String(commande.recetteTitre).toLowerCase());
    if (parTitre) return parTitre;
  }

  const nomsCommande = new Set((commande.panier || []).map((i) => String(i.nom || '').toLowerCase()).filter(Boolean));
  if (!nomsCommande.size) return null;

  let meilleurScore = 0;
  let meilleureRecette = null;

  for (const recette of toutesRecettes) {
    const nomsRecette = new Set((recette.ingredients || []).map((i) => String(i.nom || '').toLowerCase()).filter(Boolean));
    if (!nomsRecette.size) continue;

    let communs = 0;
    for (const nom of nomsCommande) {
      if (nomsRecette.has(nom)) communs += 1;
    }

    const score = communs / Math.max(nomsCommande.size, nomsRecette.size);
    if (communs >= Math.max(3, nomsCommande.size - 1) && score > meilleurScore) {
      meilleurScore = score;
      meilleureRecette = recette;
    }
  }

  return meilleureRecette;
}

function afficherHistorique(hist) {
  const container = document.getElementById('filled-state');
  container.innerHTML = '';

  hist.forEach((c, i) => {
    const date = c.dateCreation ? _formatDate(c.dateCreation) : '';
    const card = document.createElement('div');
    card.id = `hist-${c.id}`;
    card.className = 'hist-card bg-surface-container-lowest rounded-[1.6rem] shadow-sm border border-outline-variant/10 overflow-hidden';
    card.style.animationDelay = `${i * 60}ms`;
    if (i === 0) card.classList.add('open');

    card.innerHTML = `
      <div class="p-4 lg:p-5 flex gap-4 lg:gap-6">
        <div class="w-24 h-24 lg:w-28 lg:h-28 rounded-2xl overflow-hidden flex-shrink-0 bg-surface-container">
          ${c.image
            ? `<img src="${c.image}" alt="${c.recetteTitre || ''}" class="w-full h-full object-cover"/>`
            : `<div class="w-full h-full flex items-center justify-center"><span class="material-symbols-outlined text-outline text-3xl opacity-30" style="font-variation-settings:'wght' 200">restaurant</span></div>`
          }
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0">
              <h3 class="font-bold text-lg lg:text-[1.55rem] text-primary uppercase truncate">${c.recetteTitre || 'Commande #' + c.id}</h3>
              ${c.categorie ? `<p class="text-sm text-on-surface-variant mt-1">${_libelleCuisine(c.categorie)}</p>` : ''}
              ${date ? `<p class="text-xs text-outline mt-1.5">${date}</p>` : ''}
              <p class="font-bold text-2xl lg:text-[2rem] text-primary mt-2">${c.prixTotal ?? '—'} MAD</p>
            </div>
            <span class="bg-green-100 text-green-800 text-[10px] font-bold px-3 py-1 rounded-full uppercase flex-shrink-0">Livree</span>
          </div>
        </div>
      </div>

      <div class="details-panel border-t border-outline-variant/10 bg-surface-container-low/30">
        <div class="px-5 lg:px-6 py-4 grid grid-cols-2 lg:grid-cols-4 gap-5 text-xs">
          <div>
            <p class="text-[10px] font-bold text-outline uppercase tracking-wider mb-1">ID Commande</p>
            <p class="font-bold text-primary">#${c.id}</p>
          </div>
          <div>
            <p class="text-[10px] font-bold text-outline uppercase tracking-wider mb-1">Resume</p>
            <p class="font-bold text-primary">${c.nbIngredients ? c.nbIngredients + ' ingredients' : '—'}</p>
          </div>
          <div>
            <p class="text-[10px] font-bold text-outline uppercase tracking-wider mb-1">Detail paiement</p>
            <div class="space-y-1">
              <div class="flex justify-between gap-3"><span class="text-on-surface-variant">Sous-total</span><span class="font-medium">${c.sousTotal ?? '—'} MAD</span></div>
              <div class="flex justify-between gap-3"><span class="text-on-surface-variant">Livraison</span><span class="font-medium">${c.fraisLivraison ?? '—'} MAD</span></div>
              <div class="flex justify-between gap-3 pt-1 border-t border-outline-variant/20"><span class="font-bold">Total</span><span class="font-bold text-primary">${c.prixTotal ?? '—'} MAD</span></div>
            </div>
          </div>
          <div>
            <p class="text-[10px] font-bold text-outline uppercase tracking-wider mb-1">Adresse</p>
            <p class="text-on-surface-variant leading-relaxed">${_formatAdresse(c.adresseLivraison)}</p>
          </div>
        </div>
      </div>

      <div class="px-5 lg:px-6 py-4 flex items-center justify-between border-t border-outline-variant/10">
        <a href="${c.recetteId ? `/recette-detail?id=${c.recetteId}` : '#'}"
          class="bg-primary text-on-primary font-bold text-[11px] tracking-widest px-6 py-3 rounded-full uppercase hover:opacity-90 active:scale-95 transition-all ${c.recetteId ? '' : 'pointer-events-none opacity-50'}">
          Recommander
        </a>
        <button onclick="toggleCard('hist-${c.id}')"
          class="toggle-btn text-primary font-bold text-[11px] tracking-widest uppercase underline decoration-2 underline-offset-4 hover:opacity-70 transition-opacity">
          ${i === 0 ? 'Reduire' : 'Voir detail'}
        </button>
      </div>
    `;

    container.appendChild(card);
  });

  container.classList.remove('hidden');
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('empty-state').classList.remove('flex');
}

window.toggleCard = (id) => {
  const card = document.getElementById(id);
  if (!card) return;
  const btn = card.querySelector('.toggle-btn');
  card.classList.toggle('open');
  btn.textContent = card.classList.contains('open') ? 'Reduire' : 'Voir detail';
};

function _formatDate(iso) {
  try {
    return new Date(iso).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' });
  } catch {
    return iso;
  }
}

function _formatAdresse(adr) {
  if (!adr) return '—';
  if (typeof adr === 'string') return adr;
  const parts = [adr.adresse, adr.ville].filter(Boolean);
  return parts.join(', ') || '—';
}

function _libelleCuisine(categorie) {
  const libelles = {
    Marocain: 'Cuisine marocaine',
    Italien: 'Cuisine italienne',
    Japonais: 'Cuisine japonaise',
    Chinois: 'Cuisine chinoise',
    'Coréen': 'Cuisine coréenne',
    Coreen: 'Cuisine coréenne',
    Vietnamien: 'Cuisine vietnamienne',
    Indien: 'Cuisine indienne',
    Mexicain: 'Cuisine mexicaine',
    Espagnol: 'Cuisine espagnole',
    'Français': 'Cuisine française',
    Francais: 'Cuisine française',
    Asiatique: 'Cuisine asiatique',
  };
  return libelles[categorie] || `Cuisine ${String(categorie).toLowerCase()}`;
}
</script>
</body>
</html>
