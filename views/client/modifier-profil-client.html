<!DOCTYPE html>
<html class="light" lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EthnicEats — Modifier le profil</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode:"class",
    theme:{ extend:{ colors:{
      "primary":"#012d1d","on-primary":"#ffffff","primary-container":"#1b4332",
      "primary-fixed":"#c1ecd4","primary-fixed-dim":"#a5d0b9","on-primary-fixed":"#002114",
      "on-primary-fixed-variant":"#274e3d","on-primary-container":"#86af99","inverse-primary":"#a5d0b9",
      "secondary":"#775a19","on-secondary":"#ffffff","secondary-container":"#fdd587",
      "surface":"#fbf9f8","surface-container-lowest":"#ffffff","surface-container-low":"#f5f3f3",
      "surface-container":"#efeded","surface-container-high":"#e9e8e7","surface-variant":"#e3e2e2",
      "on-surface":"#1b1c1c","on-surface-variant":"#414844",
      "background":"#fbf9f8","outline":"#717973","outline-variant":"#c1c8c2",
      "error":"#ba1a1a","on-error":"#ffffff","inverse-surface":"#303030",
      "tertiary":"#282622","on-tertiary":"#ffffff","secondary-fixed-dim":"#e8c176",
    }, borderRadius:{ DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px" },
    fontFamily:{ headline:["Playfair Display","serif"], body:["Manrope","sans-serif"] }
    }}
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  body { font-family:'Manrope',sans-serif; background:#fbf9f8; }
  h1,h2,h3 { font-family:'Playfair Display',serif; }
  .sidebar-item { color:#9ca3af; transition:all 0.2s; }
  .sidebar-item:hover { color:#012d1d; background:rgba(1,45,29,0.05); border-radius:1rem; }
  .sidebar-item.active { color:#012d1d; font-weight:700; background:rgba(1,45,29,0.07); border-radius:1rem; }
  .sidebar-item.active .material-symbols-outlined { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
  .field-input { transition:border-color 0.2s, box-shadow 0.2s; }
  .field-input:focus { outline:none; border-color:#012d1d; box-shadow:0 0 0 3px rgba(1,45,29,0.08); }
  /* Déco fond */
  .bg-deco-tr { position:fixed; top:0; right:0; width:300px; height:300px; background:rgba(161,208,185,0.15); border-radius:9999px; filter:blur(100px); pointer-events:none; z-index:-1; transform:translate(30%,-30%); }
  .bg-deco-bl { position:fixed; bottom:0; left:0; width:200px; height:200px; background:rgba(232,193,118,0.08); border-radius:9999px; filter:blur(80px); pointer-events:none; z-index:-1; transform:translate(-30%,30%); }
</style>
</head>
<body class="min-h-screen text-on-surface">
<div class="bg-deco-tr"></div>
<div class="bg-deco-bl"></div>

<!-- SIDEBAR DESKTOP -->
<nav class="hidden lg:flex fixed left-0 top-0 h-full w-64 bg-surface-container-low border-r border-outline-variant/20 flex-col items-start px-4 py-10 gap-2 z-40">
  <div class="mb-8 px-2"><h1 class="font-headline text-2xl text-primary font-bold">EthnicEats</h1></div>
  <a href="/accueil" class="sidebar-item flex items-center gap-3 w-full px-4 py-3 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-colors"><span class="material-symbols-outlined">home</span>Accueil</a>
  <a href="/panier" class="sidebar-item flex items-center gap-3 w-full px-4 py-3 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-colors"><span class="material-symbols-outlined">shopping_bag</span>Panier</a>
  <a href="/suivi-commande" class="sidebar-item flex items-center gap-3 w-full px-4 py-3 rounded-2xl text-on-surface-variant hover:bg-surface-container transition-colors"><span class="material-symbols-outlined">local_shipping</span>Suivi</a>
  <a href="/profil-client" class="sidebar-item active flex items-center gap-3 w-full px-4 py-3 rounded-2xl"><span class="material-symbols-outlined">person</span>Profil</a>
</nav>

<!-- MAIN -->
<main class="lg:ml-64 min-h-screen pb-36 lg:pb-36">

  <!-- Header fixe -->
  <header class="sticky top-0 z-30 bg-surface/90 backdrop-blur-md border-b border-outline-variant/10 px-5 lg:px-10 h-16 flex items-center gap-4">
    <a href="/profil-client" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors text-primary flex-shrink-0">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <h1 class="font-headline text-xl text-primary font-bold lg:flex-1 lg:text-center lg:pr-10">Modifier le profil</h1>
  </header>

  <div class="px-5 lg:px-10 pt-6 max-w-xl lg:mx-auto space-y-6">

    <!-- Infos personnelles -->
    <section class="space-y-4">
      <div class="space-y-1.5">
        <label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Nom complet</label>
        <input id="field-nom" type="text" placeholder="Votre nom complet"
          class="field-input w-full bg-surface-container-low border border-transparent rounded-xl px-4 py-3.5 text-sm font-medium placeholder:text-outline placeholder:font-normal"/>
      </div>
      <div class="space-y-1.5">
        <label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Email</label>
        <input id="field-email" type="email" placeholder="votre@email.com"
          class="field-input w-full bg-surface-container-low border border-transparent rounded-xl px-4 py-3.5 text-sm font-medium placeholder:text-outline placeholder:font-normal"/>
      </div>
      <p id="err-infos" class="hidden text-error text-xs flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">error</span><span id="err-infos-msg"></span></p>
      <p id="ok-infos" class="hidden text-green-700 text-xs flex items-center gap-1"><span class="material-symbols-outlined text-[14px]" style="font-variation-settings:'FILL' 1">check_circle</span>Modifications enregistrées</p>
    </section>

    <!-- Séparateur -->
    <div class="border-t border-outline-variant/20"></div>

    <!-- Modifier mot de passe -->
    <section class="bg-surface-container-lowest rounded-2xl border border-outline-variant/15 p-5 shadow-sm space-y-4">
      <div class="flex items-center gap-3 mb-2">
        <span class="material-symbols-outlined text-primary text-2xl">lock_reset</span>
        <h2 class="font-bold text-primary text-base">Modifier le mot de passe</h2>
      </div>
      <div class="space-y-1.5">
        <label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Ancien mot de passe</label>
        <div class="relative">
          <input id="field-mdp-ancien" type="password" placeholder="••••••••"
            class="field-input w-full bg-surface-container-low border border-transparent rounded-xl px-4 py-3.5 pr-12 text-sm font-medium placeholder:text-outline"/>
          <button type="button" onclick="toggleVisi('field-mdp-ancien','eye1')" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
            <span id="eye1" class="material-symbols-outlined text-xl">visibility_off</span>
          </button>
        </div>
      </div>
      <div class="space-y-1.5">
        <label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Nouveau mot de passe</label>
        <div class="relative">
          <input id="field-mdp-new" type="password" placeholder="••••••••"
            class="field-input w-full bg-surface-container-low border border-transparent rounded-xl px-4 py-3.5 pr-12 text-sm font-medium placeholder:text-outline"/>
          <button type="button" onclick="toggleVisi('field-mdp-new','eye2')" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
            <span id="eye2" class="material-symbols-outlined text-xl">visibility_off</span>
          </button>
        </div>
      </div>
      <div class="space-y-1.5">
        <label class="text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Confirmer le mot de passe</label>
        <div class="relative">
          <input id="field-mdp-confirm" type="password" placeholder="••••••••"
            class="field-input w-full bg-surface-container-low border border-transparent rounded-xl px-4 py-3.5 pr-12 text-sm font-medium placeholder:text-outline"/>
          <button type="button" onclick="toggleVisi('field-mdp-confirm','eye3')" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
            <span id="eye3" class="material-symbols-outlined text-xl">visibility_off</span>
          </button>
        </div>
      </div>
      <p id="err-mdp" class="hidden text-error text-xs flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">error</span><span id="err-mdp-msg"></span></p>
      <p id="ok-mdp" class="hidden text-green-700 text-xs flex items-center gap-1"><span class="material-symbols-outlined text-[14px]" style="font-variation-settings:'FILL' 1">check_circle</span>Mot de passe modifié</p>
      <div class="flex justify-center pt-1">
        <button onclick="sauvegarderMdp()"
          class="w-full max-w-xs font-semibold text-primary text-sm uppercase tracking-widest py-3 border border-primary/20 rounded-full hover:bg-primary-fixed transition-colors active:scale-95">
          Enregistrer le mot de passe
        </button>
      </div>
    </section>

  </div>
</main>

<!-- BOUTON FIXE BAS -->
<footer class="fixed bottom-24 lg:bottom-0 left-0 lg:left-64 right-0 z-30 bg-gradient-to-t from-surface via-surface/95 to-transparent pt-10 pb-8 px-5 flex justify-center">
  <button id="btn-sauvegarder" onclick="sauvegarderInfos()"
    class="w-full max-w-md bg-primary text-on-primary rounded-full py-4 font-semibold text-sm uppercase tracking-widest shadow-xl shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all">
    Enregistrer les modifications
  </button>
</footer>

<!-- BOTTOM NAV MOBILE -->
<nav class="lg:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#fbf9f8]/90 backdrop-blur-2xl rounded-t-[2rem] shadow-[0_-12px_32px_rgba(27,28,28,0.04)] font-['Manrope'] text-[11px] font-medium uppercase tracking-widest">
  <a class="nav-item flex flex-col items-center justify-center px-4 py-2 transition-all" href="/accueil">
    <span class="material-symbols-outlined mb-1">home</span><span>Accueil</span>
  </a>
  <a class="nav-item flex flex-col items-center justify-center px-4 py-2 transition-all" href="/panier">
    <span class="material-symbols-outlined mb-1">shopping_bag</span><span>Panier</span>
  </a>
  <a class="nav-item flex flex-col items-center justify-center px-4 py-2 transition-all" href="/suivi-commande">
    <span class="material-symbols-outlined mb-1">local_shipping</span><span>Suivi</span>
  </a>
  <a class="nav-item active flex flex-col items-center justify-center px-4 py-2 transition-all" href="/profil-client">
    <span class="material-symbols-outlined mb-1">person</span><span>Profil</span>
  </a>
</nav>

<script type="module">
import { setupEmailVerificationBanner } from '../../services/emailVerificationBanner.js';
import { handleModifierProfil, handleModifierMotDePasse, protegerPage } from '../../controllers/authController.js';
import { getProfil } from '../../controllers/clientController.js';

let clientId = 'client_anonymous';

document.addEventListener('DOMContentLoaded', async () => {
  const utilisateur = await protegerPage('client');
  await setupEmailVerificationBanner();
  if (!utilisateur) return;
  if (utilisateur?.uid) clientId = utilisateur.uid;
  document.getElementById('field-nom').value = utilisateur.nomComplet || utilisateur.nom || utilisateur.displayName || '';
  document.getElementById('field-email').value = utilisateur.email || '';
  try {
    const result = await getProfil(clientId);
    if (result.success && result.profil) {
      document.getElementById('field-nom').value = result.profil.nomComplet || result.profil.nom || result.profil.displayName || utilisateur.nomComplet || '';
      document.getElementById('field-email').value = result.profil.email || utilisateur.email || '';
    }
  } catch(e) { console.error('[modifier-profil]', e); }
});

window.sauvegarderInfos = async () => {
  const nom   = document.getElementById('field-nom').value.trim();
  const email = document.getElementById('field-email').value.trim();
  _hideMsg('err-infos'); _hideMsg('ok-infos');
  if (!nom || !email) { _showErr('err-infos','err-infos-msg','Veuillez remplir tous les champs'); return; }
  if (!email.includes('@')) { _showErr('err-infos','err-infos-msg','Email invalide'); return; }
  const btn = document.getElementById('btn-sauvegarder');
  btn.disabled = true; btn.textContent = 'Enregistrement...';
  try {
    const result = await handleModifierProfil(clientId, { nomComplet: nom, email });
    if (result?.success === true) {
      document.getElementById('ok-infos').classList.remove('hidden');
    } else {
      _showErr('err-infos','err-infos-msg', result?.message || 'Erreur');
    }
  } catch(e) { _showErr('err-infos','err-infos-msg','Erreur réseau'); }
  finally { btn.disabled = false; btn.textContent = 'Enregistrer les modifications'; }
};

window.sauvegarderMdp = async () => {
  const ancien  = document.getElementById('field-mdp-ancien').value;
  const nouveau = document.getElementById('field-mdp-new').value;
  const confirm = document.getElementById('field-mdp-confirm').value;
  _hideMsg('err-mdp'); _hideMsg('ok-mdp');
  if (!ancien || !nouveau || !confirm) { _showErr('err-mdp','err-mdp-msg','Veuillez remplir tous les champs'); return; }
  if (nouveau.length < 6) { _showErr('err-mdp','err-mdp-msg','Le mot de passe doit faire au moins 6 caractères'); return; }
  if (nouveau !== confirm) { _showErr('err-mdp','err-mdp-msg','Les mots de passe ne correspondent pas'); return; }
  try {
    const result = await handleModifierMotDePasse(ancien, nouveau, confirm);
    if (result?.success === true) {
      document.getElementById('ok-mdp').classList.remove('hidden');
      ['field-mdp-ancien','field-mdp-new','field-mdp-confirm'].forEach(id => document.getElementById(id).value = '');
    } else { _showErr('err-mdp','err-mdp-msg', result?.message || 'Erreur'); }
  } catch(e) { _showErr('err-mdp','err-mdp-msg','Erreur réseau'); }
};

window.toggleVisi = (inputId, iconId) => {
  const inp = document.getElementById(inputId);
  const ico = document.getElementById(iconId);
  if (inp.type === 'password') { inp.type = 'text'; ico.textContent = 'visibility'; }
  else { inp.type = 'password'; ico.textContent = 'visibility_off'; }
};

function _showErr(elId, msgId, msg) {
  document.getElementById(elId).classList.remove('hidden');
  document.getElementById(msgId).textContent = msg;
}
function _hideMsg(elId) { document.getElementById(elId).classList.add('hidden'); }
</script>
</body>
</html>
